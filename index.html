<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathfinder Character Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/sandstone.css">
  </head> 
  <body>
    <div id="app" class="container-fluid py-4">
      <!-- Dev Tools -->
      <div class="mb-3 text-end">
        <button 
          @click="resetLocalStorage" 
          class="btn btn-outline-danger btn-sm"
          title="Clear all saved character data"
        >
          <i class="fas fa-trash"></i> Reset Data
        </button>
      </div>
      
      <main-page 
        v-if="showMainPage" 
        @create-character="showStepperComponent"
        class="mb-4">
      </main-page>
      <div v-if="showStepper" class="row justify-content-center">
        <div class="col-md-6 mb-3">
          <stepper 
            class="stepper-panel card p-3"
            @finished="onStepperFinished"
            @ability-scores-saved="onAbilityScoresSaved"
            @race-data-saved="onRaceDataSaved"
          ></stepper>
        </div>
        <div class="col-md-6 mb-3">
          <character-sheet-coordinator 
            class="card p-3"
            :character="currentCharacter"
            ref="characterSheet"
          ></character-sheet-coordinator>
        </div>
      </div>
    </div>

    <script src="js/vue.js"></script>
    <script src="js/services/character-data-service.js"></script>
    <script src="js/services/ability-calculator.js"></script>
    <script src="js/services/prerequisite-checker.js"></script>
    <script src="js/services/language-data.js"></script>
    <script src="js/components/ui/collapsible-card.js"></script>
    <script src="js/components/ui/selection-grid.js"></script>
    <script src="js/components/main-page.js"></script>
    <script src="js/components/stepper/stepper.js"></script>
    <script src="js/components/stepper/step-ability-scores.js"></script>
    <script src="js/components/stepper/ability-scores/point-buy-method.js"></script>
    <script src="js/components/stepper/ability-scores/standard-array-method.js"></script>
    <script src="js/components/stepper/ability-scores/roll-dice-method.js"></script>
    <script src="js/components/stepper/step-details.js"></script>
    <script src="js/components/stepper/class/fighter-bonus-feat.js"></script>
    <script src="js/components/stepper/class/class-selector.js"></script>
    <script src="js/components/stepper/class/class-details-display.js"></script>
    <script src="js/components/stepper/class/first-level-options.js"></script>
    <script src="js/components/stepper/class/class-step-coordinator.js"></script>
    <script src="js/components/stepper/step-race.js"></script>
    <script src="js/components/stepper/race/available-races-card.js"></script>
    <script src="js/components/stepper/race/ability-adjustments-card.js"></script>
    <script src="js/components/stepper/race/favored-class-card.js"></script>
    <script src="js/components/stepper/race/automatic-languages.js"></script>
    <script src="js/components/stepper/race/bonus-languages.js"></script>
    <script src="js/components/stepper/race/language-summary.js"></script>
    <script src="js/components/stepper/race/language-selector.js"></script>
    <script src="js/components/stepper/race/racial-traits-card.js"></script>
    <script src="js/components/stepper/step-skills.js"></script>
    <script src="js/components/stepper/step-feats.js"></script>
    <script src="js/components/stepper/step-equipment.js"></script>
    <script src="js/components/character-sheet/character-basics.js"></script>
    <script src="js/components/character-sheet/ability-scores-display.js"></script>
    <script src="js/components/character-sheet/character-list-display.js"></script>
    <script src="js/components/character-sheet/character-details.js"></script>
    <script src="js/components/character-sheet/character-sheet-coordinator.js"></script>
    <script>
    new Vue({
      el: '#app',
      data: {
        showMainPage: true,
        showStepper: false,
        currentCharacter: {}
      },
      methods: {
        showStepperComponent() {
          this.showMainPage = false;
          this.showStepper = true;
          this.currentCharacter = {}; // Reset for new character
        },
        updateCharacter(character) {
          this.currentCharacter = character;
        },
        onStepperFinished() {
          this.showStepper = false;
          this.showMainPage = true;
        },
        onAbilityScoresSaved() {
          // Call the character sheet's update method
          if (this.$refs.characterSheet) {
            this.$refs.characterSheet.updateAbilityScores();
          }
        },
        resetLocalStorage() {
          if (confirm('This will clear all saved character data. Are you sure?')) {
            localStorage.clear();
            location.reload();
          }
        },
        onRaceDataSaved() {
          // Call the character sheet's update method for all race-related data
          if (this.$refs.characterSheet) {
            this.$refs.characterSheet.updateFromLocalStorage();
          }
        }
      }
    });
    </script>
  </body>
</html>
